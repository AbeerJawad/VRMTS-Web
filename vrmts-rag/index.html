<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Chatbot</title>

<style>
    body { 
        font-family: Arial; 
        background: #eef1f5; 
        padding: 20px; 
        display: flex; 
        flex-direction: column; 
        align-items: center;
    }

    #chat {
        width: 90%;
        max-width: 600px;
        background: #ffffff;
        padding: 20px;
        border-radius: 12px;
        height: 70vh;
        overflow-y: auto;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .message {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
        font-size: 15px;
    }

    .user-bubble {
        align-self: flex-end;
        background: #007bff;
        color: white;
        padding: 10px 14px;
        border-radius: 14px;
        max-width: 75%;
        white-space: pre-wrap;
    }

    .bot-bubble {
        align-self: flex-start;
        background: #e0e0e0;
        padding: 10px 14px;
        border-radius: 14px;
        max-width: 75%;
        white-space: pre-wrap;
    }

    #input-area {
        width: 90%;
        max-width: 600px;
        margin-top: 10px;
        display: flex;
        gap: 10px;
    }

    input[type=text] {
        flex: 1;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 15px;
    }

    button {
        padding: 12px 22px;
        border-radius: 8px;
        border: none;
        background: #007bff;
        color: white;
        cursor: pointer;
        font-size: 15px;
    }

    button:hover {
        background: #0056b3;
    }

</style>

</head>
<body>

<h2>📘 Human Anatomy RAG Chatbot</h2>

<div id="chat"></div>

<div id="input-area">
    <input type="text" id="question" placeholder="Ask a question..." />
    <button onclick="sendQuestion()">Send</button>
</div>

<script>

document.getElementById("question").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        sendQuestion();
    }
});

async function sendQuestion() {
    const q = document.getElementById("question").value.trim();
    if (!q) return;

    addBubble(q, "user");
    document.getElementById("question").value = "";

    // Show THINKING bubble
    const thinkingBubble = addBubble("Thinking…", "bot");

    try {
        const res = await fetch("/ask", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ q: q, k: 8, use_llm: true })
        });

        const data = await res.json();

        // Remove "Thinking…"
        thinkingBubble.remove();

        let botMsg = data.answer || "No response.";

        if (data.citations && data.citations.length > 0) {
            botMsg += "\n\n📎 **Citations:** " + data.citations.join(", ");
        }

        addBubble(botMsg, "bot");

    } catch (e) {
        thinkingBubble.remove();
        addBubble("⚠️ Error contacting server: " + e.message, "bot");
    }
}

function addBubble(text, sender) {
    const chat = document.getElementById("chat");

    const wrapper = document.createElement("div");
    wrapper.classList.add("message");

    const bubble = document.createElement("div");
    bubble.classList.add(sender === "user" ? "user-bubble" : "bot-bubble");
    bubble.textContent = text;

    wrapper.appendChild(bubble);
    chat.appendChild(wrapper);
    chat.scrollTop = chat.scrollHeight;

    return wrapper;
}

</script>

</body>
</html>
